<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWG Route Dispatcher – American Welding & Gas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --awg-navy:#0a1628;--awg-dark:#0e1f3d;--awg-blue:#1a3a6b;
  --awg-red:#c8102e;--awg-red-light:#e8243f;--awg-white:#ffffff;
  --awg-gray:#8892a4;--awg-light:#d1d9e6;--awg-surface:#111d35;
  --awg-border:#1e3055;--awg-yellow:#f0b323;--awg-orange:#e87722;
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--awg-navy);color:var(--awg-white);overflow:hidden}
#app{display:grid;grid-template-columns:420px 1fr;grid-template-rows:auto 1fr;height:100vh}

/* ── Top Bar ── */
.topbar{
  grid-column:1/-1;background:linear-gradient(135deg,var(--awg-dark),var(--awg-navy));
  border-bottom:3px solid var(--awg-red);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:68px;position:relative;overflow:hidden;
}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--awg-red),var(--awg-orange),var(--awg-yellow),var(--awg-orange),var(--awg-red))}
.topbar-left{display:flex;align-items:center;gap:16px}
.awg-logo{height:50px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.topbar-title h1{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1.1}
.topbar-title span{font-size:11px;color:var(--awg-gray);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.topbar-right{font-size:13px;color:var(--awg-gray);text-align:right;line-height:1.3}
.topbar-right strong{color:var(--awg-yellow);font-weight:600}

/* ── Sidebar ── */
.sidebar{background:var(--awg-surface);border-right:1px solid var(--awg-border);display:flex;flex-direction:column;overflow:hidden}
.upload-section{padding:20px;flex-shrink:0}
.upload-zone{border:2px dashed var(--awg-border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:.25s;background:rgba(26,58,107,.15)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--awg-red);background:rgba(200,16,46,.08)}
.upload-zone.has-file{border-color:var(--awg-yellow);border-style:solid;background:rgba(240,179,35,.06)}
.upload-zone input{display:none}
.upload-zone .icon{font-size:32px;margin-bottom:6px}
.upload-zone h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.upload-zone p{font-size:11px;color:var(--awg-gray);margin-top:4px}
.file-name{font-size:12px;color:var(--awg-yellow);margin-top:6px;font-weight:600}

/* Gas Tabs */
.gas-tabs{display:flex;gap:0;padding:0 20px;flex-shrink:0;border-bottom:1px solid var(--awg-border);overflow-x:auto}
.gas-tabs::-webkit-scrollbar{height:0}
.gas-tab{
  padding:10px 14px;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;color:var(--awg-gray);cursor:pointer;
  border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;
  transition:.15s;display:flex;align-items:center;gap:6px;
}
.gas-tab:hover{color:var(--awg-white)}
.gas-tab.active{color:var(--awg-white);border-bottom-color:var(--awg-red)}
.gas-tab .cnt{background:var(--awg-blue);color:var(--awg-light);font-size:10px;padding:1px 6px;border-radius:8px}
.gas-tab.active .cnt{background:var(--awg-red)}
.gas-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Actions */
.actions{padding:12px 20px;display:flex;gap:8px;flex-shrink:0}
.btn{padding:10px 16px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.5px}
.btn-route{background:var(--awg-red);color:#fff;flex:1}.btn-route:hover{background:var(--awg-red-light)}.btn-route:disabled{opacity:.35;cursor:default}
.btn-all{background:var(--awg-blue);color:#fff;flex:1}.btn-all:hover{background:#244e8a}.btn-all:disabled{opacity:.35;cursor:default}
.btn-clear{background:transparent;border:1px solid var(--awg-border);color:var(--awg-gray)}.btn-clear:hover{border-color:var(--awg-red);color:var(--awg-white)}

/* Stop List */
.stop-list{flex:1;overflow-y:auto;padding:0 20px 20px}
.stop-list::-webkit-scrollbar{width:4px}.stop-list::-webkit-scrollbar-thumb{background:var(--awg-border);border-radius:9px}
.stop-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(30,48,85,.5)}
.stop-num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;margin-top:1px}
.stop-info{flex:1;min-width:0}
.stop-info .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-info .product{font-size:11px;color:var(--awg-yellow);font-weight:600;margin-top:1px}
.stop-info .addr{font-size:11px;color:var(--awg-gray);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-info .level{font-size:10px;margin-top:3px;font-weight:600}
.level-low{color:var(--awg-red)}.level-med{color:var(--awg-orange)}.level-ok{color:#22c55e}
.no-gps{font-size:10px;color:var(--awg-gray);font-style:italic}

.summary-bar{padding:14px 20px;background:var(--awg-navy);border-top:1px solid var(--awg-border);flex-shrink:0;font-size:12px;color:var(--awg-gray);display:none;gap:20px;font-weight:500}
.summary-bar strong{color:var(--awg-white)}

.empty-state{text-align:center;padding:40px 20px;color:var(--awg-gray)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--awg-light);text-transform:uppercase;margin-bottom:4px}
.empty-state p{font-size:12px}

/* ── Map ── */
.map-wrap{position:relative}
#map{width:100%;height:100%}
.leaflet-tile-pane{filter:saturate(.25) brightness(.8) contrast(1.15)}
.loading-overlay{position:absolute;inset:0;background:rgba(10,22,40,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;opacity:0;pointer-events:none;transition:.3s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:44px;height:44px;border:3px solid var(--awg-border);border-top-color:var(--awg-red);border-radius:50%;animation:spin .7s linear infinite}
.load-text{font-size:13px;color:var(--awg-gray);font-weight:600;text-transform:uppercase;letter-spacing:1px}
@keyframes spin{to{transform:rotate(360deg)}}
.map-legend{position:absolute;bottom:24px;left:16px;z-index:500;background:var(--awg-surface);border:1px solid var(--awg-border);border-radius:8px;padding:12px 16px;font-size:11px;max-width:240px;display:none}
.map-legend h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:8px;margin:4px 0}
.legend-swatch{width:14px;height:4px;border-radius:2px}
@media(max-width:860px){#app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}.sidebar{max-height:45vh;overflow-y:auto}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <img class="awg-logo" src="https://us.evocdn.io/dealer/1294/content/media/75th%20Logo-11%20-%20transparent.png" alt="AWG" onerror="this.outerHTML='<div style=&quot;font-family:Barlow Condensed;font-size:28px;font-weight:900;color:#c8102e&quot;>AWG</div>'">
      <div class="topbar-title"><h1>Route Dispatcher</h1><span>Bulk Gas Delivery Routing</span></div>
    </div>
    <div class="topbar-right"><strong>🏭 Orlando Shop</strong><br>2450 Shader Rd, Orlando, FL 32804</div>
  </div>

  <div class="sidebar">
    <div class="upload-section">
      <div class="upload-zone" id="dropZone">
        <div class="icon">📊</div>
        <h3>Upload Pulsa Sensor Export</h3>
        <p>.xlsx or .csv – Pulsa sensor export format</p>
        <div class="file-name" id="fileName" style="display:none"></div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.tsv">
      </div>
    </div>
    <div class="gas-tabs" id="gasTabs" style="display:none"></div>
    <div class="actions" id="actionsBar" style="display:none">
      <button class="btn btn-route" id="routeBtn" disabled>🚚 Route This Gas</button>
      <button class="btn btn-all" id="routeAllBtn" disabled>Route All</button>
      <button class="btn btn-clear" id="clearBtn">✕</button>
    </div>
    <div class="stop-list" id="stopList">
      <div class="empty-state"><div class="icon">🔩</div><h3>No Sensor Data Loaded</h3><p>Upload a Pulsa sensor export to begin routing</p></div>
    </div>
    <div class="summary-bar" id="summary">
      <div>Stops: <strong id="sumStops">0</strong></div>
      <div>Est: <strong id="sumDist">—</strong></div>
      <div>Gas: <strong id="sumGas">—</strong></div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="loading-overlay" id="loader"><div class="spinner"></div><div class="load-text" id="loadText">Processing...</div></div>
    <div class="map-legend" id="mapLegend"><h4>Gas Routes</h4><div id="legendItems"></div></div>
  </div>
</div>

<script>
const HOME={name:"Orlando Shop",lat:28.5765,lng:-81.3341,address:"2450 Shader Rd, Orlando, FL 32804"};
const GAS_CFG={
  Argon:{color:'#8b5cf6',icon:'Ar'},Oxygen:{color:'#3b82f6',icon:'O₂'},
  Nitrogen:{color:'#06b6d4',icon:'N₂'},CO2:{color:'#f59e0b',icon:'CO₂'},
  Hydrogen:{color:'#ef4444',icon:'H₂'},Helium:{color:'#a855f7',icon:'He'},
  Propane:{color:'#f97316',icon:'C₃'},'Mixed/Other':{color:'#64748b',icon:'Mix'}
};
let allStops=[],gasGroups={},activeGas=null,mapLayers=[];

// Map
const map=L.map('map',{zoomControl:false}).setView([HOME.lat,HOME.lng],8);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:19}).addTo(map);
const homeIcon=L.divIcon({className:'',html:'<div style="width:38px;height:38px;background:#c8102e;border:3px solid #fff;border-radius:50%;display:grid;place-items:center;font-size:16px;box-shadow:0 3px 12px rgba(0,0,0,.5);color:#fff;font-weight:800">🏭</div>',iconSize:[38,38],iconAnchor:[19,19]});
const homeMarker=L.marker([HOME.lat,HOME.lng],{icon:homeIcon}).addTo(map).bindPopup('<b>AWG Orlando Shop</b><br>2450 Shader Rd');

// Upload
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));

function handleFile(f){
  if(!f)return;
  document.getElementById('fileName').textContent=f.name;
  document.getElementById('fileName').style.display='block';
  dropZone.classList.add('has-file');
  showLoader('Reading file...');
  const r=new FileReader();
  r.onload=e=>{f.name.match(/\.csv$/i)?parseCSV(e.target.result):parseXLSX(e.target.result)};
  f.name.match(/\.csv$/i)?r.readAsText(f):r.readAsArrayBuffer(f);
}

function parseXLSX(d){
  try{const wb=XLSX.read(d,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];processRows(XLSX.utils.sheet_to_json(ws,{defval:''}))}
  catch(e){alert('Error: '+e.message);hideLoader()}
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2){alert('Need header+data');hideLoader();return}
  const h=csvLine(lines[0]),rows=[];
  for(let i=1;i<lines.length;i++){const c=csvLine(lines[i]),row={};h.forEach((k,j)=>row[k.trim()]=((c[j]||'').trim()));rows.push(row)}
  processRows(rows);
}
function csvLine(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c=''}else c+=ch}r.push(c);return r}

function processRows(rows){
  showLoader('Parsing sensors...');
  allStops=[];
  rows.forEach(row=>{
    const sn=row['Sensor Name']||'',ln=row['Location Name']||'',
      addr=row['Location Address']||'',gps=row['Location GPS']||'',
      prod=row['Product Name']||'',pct=row['Most Recent Measure %']||'';
    let lat=null,lng=null;
    if(gps){const m=gps.match(/([\d.]+)°?\s*([NS]),?\s*([\d.]+)°?\s*([EW])/i);
      if(m){lat=parseFloat(m[1])*(m[2].toUpperCase()==='S'?-1:1);lng=parseFloat(m[3])*(m[4].toUpperCase()==='W'?-1:1)}}
    const gas=detectGas(prod,sn),cleanAddr=addr.split('\\n')[0].split('\n')[0].trim();
    let level=parseFloat(pct);
    allStops.push({name:ln||sn.substring(0,40),sensorName:sn,product:prod,gasType:gas,address:cleanAddr,lat,lng,level:isNaN(level)?null:level,hasGPS:lat!==null&&lng!==null});
  });
  gasGroups={};allStops.forEach(s=>{if(!gasGroups[s.gasType])gasGroups[s.gasType]=[];gasGroups[s.gasType].push(s)});
  buildTabs();hideLoader();
}

function detectGas(p,s){
  const t=(p+' '+s).toUpperCase();
  if(/\bARGON\b|\/AR\b/.test(t))return'Argon';
  if(/\bOXYGEN\b|\bO2\b|\bMED\s*OX/.test(t))return'Oxygen';
  if(/\bNITROGEN\b|\bLIN\b|\bN2\b/.test(t))return'Nitrogen';
  if(/\bCO2\b|\bCARBON\s*DI/.test(t))return'CO2';
  if(/\bHYDROGEN\b|\bH2\b/.test(t))return'Hydrogen';
  if(/\bHELIUM\b|\bHE\b/.test(t))return'Helium';
  if(/\bPROPANE\b/.test(t))return'Propane';
  return'Mixed/Other';
}

function buildTabs(){
  const el=document.getElementById('gasTabs');
  const types=Object.keys(gasGroups).sort((a,b)=>{
    const o=['Argon','Oxygen','Nitrogen','CO2','Hydrogen','Helium','Propane','Mixed/Other'];
    return o.indexOf(a)-o.indexOf(b)});
  let h=`<button class="gas-tab active" data-gas="ALL"><span class="gas-dot" style="background:#fff"></span>ALL<span class="cnt">${allStops.length}</span></button>`;
  types.forEach(g=>{const c=GAS_CFG[g]||GAS_CFG['Mixed/Other'];
    h+=`<button class="gas-tab" data-gas="${g}"><span class="gas-dot" style="background:${c.color}"></span>${g}<span class="cnt">${gasGroups[g].length}</span></button>`});
  el.innerHTML=h;el.style.display='flex';
  document.getElementById('actionsBar').style.display='flex';
  el.querySelectorAll('.gas-tab').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('.gas-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    activeGas=b.dataset.gas;renderList();
    document.getElementById('routeBtn').disabled=false;document.getElementById('routeAllBtn').disabled=false;
    document.getElementById('routeBtn').textContent=activeGas==='ALL'?'🚚 Route All':'🚚 Route '+activeGas;
  }));
  activeGas='ALL';renderList();
  document.getElementById('routeBtn').disabled=false;document.getElementById('routeAllBtn').disabled=false;
}

function renderList(){
  const el=document.getElementById('stopList'),list=activeGas==='ALL'?allStops:(gasGroups[activeGas]||[]);
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="icon">📭</div><h3>No stops</h3></div>';return}
  el.innerHTML=list.map((s,i)=>{
    const c=GAS_CFG[s.gasType]||GAS_CFG['Mixed/Other'];
    const lvl=s.level!==null?`<span class="level ${s.level<15?'level-low':s.level<40?'level-med':'level-ok'}">${s.level.toFixed(1)}% full</span>`:'';
    return`<div class="stop-item">
      <div class="stop-num" style="background:${c.color}22;border:2px solid ${c.color};color:${c.color}">${i+1}</div>
      <div class="stop-info">
        <div class="name">${esc(s.name)}</div>
        <div class="product">${esc(s.product)}</div>
        ${s.address?`<div class="addr">${esc(s.address)}</div>`:''}
        ${lvl}${!s.hasGPS?'<div class="no-gps">⚠ No GPS</div>':''}
      </div></div>`}).join('');
}
function esc(s){return s?s.replace(/</g,'&lt;').replace(/>/g,'&gt;'):'—'}

// Routing
document.getElementById('routeBtn').addEventListener('click',()=>{activeGas==='ALL'?routeAll():routeGas(activeGas)});
document.getElementById('routeAllBtn').addEventListener('click',routeAll);
document.getElementById('clearBtn').addEventListener('click',()=>{
  allStops=[];gasGroups={};activeGas=null;clearLayers();
  ['gasTabs','actionsBar','summary','mapLegend'].forEach(id=>{document.getElementById(id).style.display='none'});
  document.getElementById('fileName').style.display='none';dropZone.classList.remove('has-file');
  document.getElementById('stopList').innerHTML='<div class="empty-state"><div class="icon">🔩</div><h3>No Sensor Data Loaded</h3><p>Upload a Pulsa sensor export to begin routing</p></div>';
  map.setView([HOME.lat,HOME.lng],8);
});

function routeGas(gas){
  clearLayers();
  const stops=(gasGroups[gas]||[]).filter(s=>s.hasGPS);
  if(!stops.length){alert('No GPS stops for '+gas);return}
  const c=GAS_CFG[gas]||GAS_CFG['Mixed/Other'],ord=nn(stops);
  drawRoute(ord,c.color);
  const mi=routeDist(ord);
  document.getElementById('sumStops').textContent=ord.length;
  document.getElementById('sumDist').textContent=`~${mi.toFixed(1)} mi`;
  document.getElementById('sumGas').textContent=gas;
  document.getElementById('summary').style.display='flex';
  showLeg([{gas,color:c.color,count:ord.length,mi}]);
}

function routeAll(){
  clearLayers();const infos=[];let allPts=[];
  Object.keys(gasGroups).forEach(gas=>{
    const stops=gasGroups[gas].filter(s=>s.hasGPS);if(!stops.length)return;
    const c=GAS_CFG[gas]||GAS_CFG['Mixed/Other'],ord=nn(stops),pts=drawRoute(ord,c.color);
    const mi=routeDist(ord);infos.push({gas,color:c.color,count:ord.length,mi});allPts.push(...pts);
  });
  if(allPts.length)map.fitBounds(L.latLngBounds(allPts).pad(.1));
  const ts=infos.reduce((a,i)=>a+i.count,0),tm=infos.reduce((a,i)=>a+i.mi,0);
  document.getElementById('sumStops').textContent=ts;
  document.getElementById('sumDist').textContent=`~${tm.toFixed(1)} mi total`;
  document.getElementById('sumGas').textContent='All Gases';
  document.getElementById('summary').style.display='flex';
  showLeg(infos);
}

function drawRoute(ord,color){
  const pts=[[HOME.lat,HOME.lng]];
  ord.forEach((s,i)=>{
    const ic=L.divIcon({className:'',html:`<div style="width:28px;height:28px;background:${color};border:2px solid #fff;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;font-family:'Barlow Condensed',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.4)">${i+1}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
    const m=L.marker([s.lat,s.lng],{icon:ic}).addTo(map);
    const lv=s.level!==null?`<br>Level: ${s.level.toFixed(1)}%`:'';
    m.bindPopup(`<b>${s.name}</b><br><em>${s.product}</em>${lv}<br>${s.address||''}`);
    mapLayers.push(m);pts.push([s.lat,s.lng]);
  });
  pts.push([HOME.lat,HOME.lng]);
  const line=L.polyline(pts,{color,weight:3,opacity:.75,dashArray:'8 5'}).addTo(map);
  mapLayers.push(line);map.fitBounds(line.getBounds().pad(.1));return pts;
}

function nn(stops){const o=[];const r=[...stops];let c={lat:HOME.lat,lng:HOME.lng};
  while(r.length){let b=0,bd=Infinity;r.forEach((s,i)=>{const d=hav(c,s);if(d<bd){bd=d;b=i}});o.push(r.splice(b,1)[0]);c=o[o.length-1]}return o}
function routeDist(o){let k=0,p={lat:HOME.lat,lng:HOME.lng};o.forEach(s=>{k+=hav(p,s);p=s});k+=hav(p,{lat:HOME.lat,lng:HOME.lng});return k*.621371}
function hav(a,b){const R=6371,dL=(b.lat-a.lat)*Math.PI/180,dN=(b.lng-a.lng)*Math.PI/180;const x=Math.sin(dL/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function clearLayers(){mapLayers.forEach(l=>map.removeLayer(l));mapLayers=[]}
function showLeg(infos){const el=document.getElementById('mapLegend'),it=document.getElementById('legendItems');
  it.innerHTML=infos.map(i=>`<div class="legend-item"><div class="legend-swatch" style="background:${i.color}"></div><span>${i.gas} — ${i.count} stops (~${i.mi.toFixed(0)} mi)</span></div>`).join('');el.style.display='block'}
function showLoader(t){document.getElementById('loadText').textContent=t||'Processing...';document.getElementById('loader').classList.add('show')}
function hideLoader(){document.getElementById('loader').classList.remove('show')}
</script>
